<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTOV Simulation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="vh-100 m-0 overflow-hidden bg-black">

<video
        id="resultVideo"
        class="position-fixed top-0 start-0 w-100 h-100"
        autoplay
        loop
        muted
        playsinline
        preload="auto"
        style="z-index: 0; object-fit: cover; background: black; opacity: 1;">
</video>

<div class="position-fixed top-0 start-0 p-3" style="z-index: 2;">
    <div
            class="text-white p-2 rounded-3"
            style="width: 220px; background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(4px); font-size: 13px;">

        <label for="massRange" class="form-label">
            Core mass: <span id="massValue">10.0</span> M☉
        </label>

        <input
                type="range"
                class="form-range"
                id="massRange"
                min="0.1"
                max="50.0"
                step="0.1"
                value="10.0">

        <button
                id="executeBtn"
                class="btn btn-primary w-100"
                style="font-size: 13px; padding: 5px 8px;">
            Execute
        </button>

        <p id="result" class="mt-2 mb-0"></p>
    </div>
</div>

<script src="/js/index.js"></script>
</body>
</html>
