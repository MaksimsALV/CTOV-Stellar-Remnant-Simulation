<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>CTOV Simulation</title>
</head>
<body class="p-4">

<div class="container">
    <label for="massRange" class="form-label">
        Core mass: <span id="massValue">10.0</span> M☉
    </label>

    <input
            type="range"
            class="form-range"
            id="massRange"
            min="0.1"
            max="50.0"
            step="0.1"
            value="10.0">

    <button id="executeBtn" class="btn btn-primary mt-3">Execute</button>

    <p id="result" class="mt-3"></p>

    <video
            id="resultVideo"
            class="mt-3"
            style="max-width: 100%; display: none;"
            autoplay
            loop
            muted
            playsinline
            preload="auto">
    </video>

    <img
            id="resultImage"
            class="mt-3"
            style="max-width: 100%; display: none;"
            alt="Collapse result image">
</div>
</div>

<script type="module" src="/js/index.js"></script>
</body>
</html>
