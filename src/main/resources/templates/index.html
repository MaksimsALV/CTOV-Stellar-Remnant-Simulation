<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTOV Simulation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: black;
        }

        .background-media {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            display: none;
            background: black;
        }

        .overlay-ui {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 2;
        }

        .control-box {
            width: 220px;
            background: rgba(0, 0, 0, 0.45);
            padding: 10px;
            border-radius: 10px;
            color: white;
            backdrop-filter: blur(4px);
            font-size: 13px;
        }

        .control-box .btn {
            font-size: 13px;
            padding: 5px 8px;
        }
    </style>
</head>
<body>

<video
        id="resultVideo"
        class="background-media"
        autoplay
        loop
        muted
        playsinline
        preload="auto"
        style="opacity:1;">
</video>

<img
        id="resultImage"
        class="background-media"
        alt="Collapse result image">

<div class="overlay-ui">
    <div class="control-box">
        <label for="massRange" class="form-label">
            Core mass: <span id="massValue">10.0</span> M☉
        </label>

        <input
                type="range"
                class="form-range"
                id="massRange"
                min="0.1"
                max="50.0"
                step="0.1"
                value="10.0">

        <button id="executeBtn" class="btn btn-primary w-100">Execute</button>

        <p id="result" class="mt-2 mb-0"></p>
    </div>
</div>

<script src="/js/index.js"></script>
</body>
</html>
